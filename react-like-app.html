<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Product Store - Single File</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            color: #4a5568;
            font-size: 2rem;
        }

        .search-bar {
            display: flex;
            gap: 1rem;
        }

        .search-bar input, .search-bar select {
            padding: 0.8rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-bar input:focus, .search-bar select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .products-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 1rem;
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2d3748;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #48bb78;
            margin-bottom: 1rem;
        }

        .product-category {
            background: #667eea;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .cart-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #48bb78, #38a169);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(72, 187, 120, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        #cartCount {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e53e3e;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .close {
            position: absolute;
            right: 1.5rem;
            top: 1.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: #a0aec0;
        }

        .close:hover {
            color: #4a5568;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-total {
            text-align: center;
            padding: 1.5rem 0;
            font-size: 1.3rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, #48bb78, #38a169);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(72, 187, 120, 0.4);
        }

        .no-products {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #a0aec0;
            font-size: 1.2rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }
            .search-bar {
                flex-direction: column;
                width: 100%;
            }
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>🛒 Mini Product Store</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products...">
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="make-up">Make-Up</option>
                <option value="furniture">Furniture</option>
                <option value="grocery">Grocery</option>
            </select>
        </div>
    </header>

    <!-- Products Grid -->
    <main class="products-container">
        <div id="productsGrid" class="products-grid">
            <div class="no-products">Loading products... ⏳</div>
        </div>
    </main>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>🛒 Shopping Cart</h2>
            <div id="cartItems"></div>
            <div class="cart-total">
                <strong>Total: $<span id="cartTotal">0</span></strong>
            </div>
            <button id="checkoutBtn" class="checkout-btn">Checkout</button>
        </div>
    </div>

    <!-- Cart Icon -->
    <div class="cart-icon" id="cartIcon">
        <span>🛒</span>
        <span id="cartCount">0</span>
    </div>

    <script>
        // Dummy JSON API
        const API_URL = 'https://dummyjson.com/products?limit=20';

        let allProducts = [];
        let cart = [];
        let filteredProducts = [];

        // DOM Elements
        const productsGrid = document.getElementById('productsGrid');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const cartIcon = document.getElementById('cartIcon');
        const cartModal = document.getElementById('cartModal');
        const cartItems = document.getElementById('cartItems');
        const cartTotal = document.getElementById('cartTotal');
        const cartCount = document.getElementById('cartCount');
        const closeModal = document.querySelector('.close');
        const checkoutBtn = document.getElementById('checkoutBtn');

        // Fetch products
        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                allProducts = data.products;
                filteredProducts = [...allProducts];
                renderProducts();
            } catch (error) {
                console.error('API Error:', error);
                // Fallback data
                allProducts = [
                    {id:1,title:"lipstick ",price:999,category:"make-up",thumbnail:"https://i.dummyjson.com/400x400/1/1"},
                    {id:2,title:"Dior J'adore",price:129,category:"perfumes",thumbnail:"https://i.dummyjson.com/400x400/2/1"},
                    {id:3,title:"Sofa",price:1299,category:"furniture",thumbnail:"https://i.dummyjson.com/400x400/3/1"},
                    {id:4,title:"food-items",price:29,category:"grocery",thumbnail:"https://i.dummyjson.com/400x400/4/1"},
                    {id:5,title:"oil",price:49,category:"oil",thumbnail:"https://i.dummyjson.com/400x400/5/1"}
                ];
                filteredProducts = [...allProducts];
                renderProducts();
            }
        }

        // Render products
        function renderProducts(products = filteredProducts) {
            if (products.length === 0) {
                productsGrid.innerHTML = '<div class="no-products">No products found 😔</div>';
                return;
            }

            productsGrid.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.thumbnail}" alt="${product.title}" class="product-image" onerror="this.src='https://via.placeholder.com/300x200/667eea/ffffff?text=No+Image'">
                    <h3 class="product-title">${product.title}</h3>
                    <span class="product-category">${product.category}</span>
                    <div class="product-price">$${product.price}</div>
                    <button class="add-to-cart-btn" onclick="addToCart(${product.id})">
                        Add to Cart 🛒
                    </button>
                </div>
            `).join('');
        }

        // Add to cart
        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartCount();
            showNotification('Added to cart! ✅');
        }

        // Update cart count
        function updateCartCount() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
        }

        // Cart modal
        cartIcon.addEventListener('click', () => {
            renderCart();
            cartModal.style.display = 'block';
        });

        closeModal.addEventListener('click', () => {
            cartModal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === cartModal) {
                cartModal.style.display = 'none';
            }
        });

        // Render cart
        function renderCart() {
            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align: center; color: #a0aec0; padding: 2rem;">Cart is empty 😢</p>';
                cartTotal.textContent = '0';
                return;
            }

            cartItems.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div>
                        <h4>${item.title}</h4>
                        <p>$${item.price} x ${item.quantity}</p>
                    </div>
                    <div>
                        <strong>$${(item.price * item.quantity).toFixed(2)}</strong>
                        <br><br>
                        <button onclick="removeFromCart(${item.id})" style="background: #e53e3e; color: white; border: none; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer;">Remove</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.textContent = total.toFixed(2);
        }

        // Remove from cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            renderCart();
            updateCartCount();
        }

        // Checkout
        checkoutBtn.addEventListener('click', () => {
            if (cart.length === 0) {
                showNotification('Cart is empty! 🛒');
                return;
            }
            alert(`Thank you! Total: $${cartTotal.textContent}\nOrder placed successfully! 🎉`);
            cart = [];
            renderCart();
            updateCartCount();
            cartModal.style.display = 'none';
        });

        // Search & Filter
        searchInput.addEventListener('input', filterProducts);
        categoryFilter.addEventListener('change', filterProducts);

        function filterProducts() {
            const searchTerm = searchInput.value.toLowerCase();
            const category = categoryFilter.value;

            filteredProducts = allProducts.filter(product => {
                const matchesSearch = product.title.toLowerCase().includes(searchTerm);
                const matchesCategory = !category || product.category === category;
                return matchesSearch && matchesCategory;
            });

            renderProducts();
        }

        // Notification
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #48bb78;
                color: white;
                padding: 1rem 2rem;
                border-radius: 10px;
                z-index: 3000;
                animation: slideIn 0.3s ease;
                font-weight: 600;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => notification.remove(), 300);
            }, 2500);
        }

        // Initialize
        fetchProducts();
    </script>
</body>
</html>
